<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>XO PRO MAX UI</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1a2a6c, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD */
.card {
  width: 95vw;
  max-width: 700px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 25px;
  text-align: center;
  color: white;
  box-shadow: 0 0 30px rgba(0,255,255,0.3);
}

/* TITLE */
h2 {
  font-size: 32px;
  margin-bottom: 20px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 20px;
  margin: 10px 0;
  font-size: 20px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* SELECT */
select {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  margin-bottom: 10px;
}

/* SCORE */
.score {
  display: flex;
  justify-content: space-around;
  font-size: 22px;
  margin-bottom: 15px;
}

/* BOARD */
.board {
  display: grid;
  grid-template-columns: repeat(3, 150px);
  grid-template-rows: repeat(3, 150px);
  gap: 12px;
  justify-content: center;
}

/* CELL */
.cell {
  background: #111;
  border: 3px solid cyan;
  border-radius: 15px;
  font-size: 70px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: 0.15s;
}

.cell:hover {
  box-shadow: 0 0 20px cyan;
}

.cell:active {
  transform: scale(0.85);
}

.X { color: #00ff88; }
.O { color: #ff5252; }

.highlight {
  background: gold !important;
  color: black !important;
}

/* STATUS */
#status {
  font-size: 28px;
  margin-bottom: 10px;
}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: 0;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(720deg);
  }
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="card">
  <h2>🎮 XO PRO MAX</h2>

  <select id="level">
    <option value="easy">Dễ</option>
    <option value="medium">Trung bình</option>
    <option value="hard">Khó</option>
  </select>

  <button onclick="startGame('ai')">🤖 Chơi với AI</button>
  <button onclick="startGame('2p')">👥 2 Người</button>
</div>

<!-- GAME -->
<div id="game" class="card" style="display:none">
  <div class="score">
    <div>X: <span id="xScore">0</span></div>
    <div>O: <span id="oScore">0</span></div>
    <div>Hòa: <span id="drawScore">0</span></div>
  </div>

  <div id="status"></div>
  <div class="board" id="board"></div>

  <button onclick="restart()">🔄 Chơi lại</button>
  <button onclick="back()">🏠 Menu</button>
</div>

<audio id="clickSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let board = Array(9).fill(null);
let current = 'X';
let gameOver = false;
let mode = 'ai';

let score = {X:0, O:0, draw:0};

function startGame(m){
  mode = m;
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  createBoard();
}

function createBoard(){
  const b=document.getElementById("board");
  b.innerHTML="";
  board=Array(9).fill(null);
  current='X';
  gameOver=false;
  document.getElementById("status").textContent="Lượt: X";

  for(let i=0;i<9;i++){
    let cell=document.createElement("div");
    cell.className="cell";
    cell.onclick=()=>move(i);
    b.appendChild(cell);
  }
}

function move(i){
  if(board[i]||gameOver) return;

  board[i]=current;
  render();
  playClick();

  if(checkWin()) return;

  current = current==='X'?'O':'X';
  document.getElementById("status").textContent="Lượt: "+current;

  if(mode==="ai" && current==="O"){
    setTimeout(aiMove,300);
  }
}

function render(){
  document.querySelectorAll(".cell").forEach((c,i)=>{
    c.textContent = board[i] || "";
    c.classList.remove("X","O");
    if(board[i]) c.classList.add(board[i]);
  });
}

function checkWin(){
  const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  for(let combo of wins){
    let [a,b,c]=combo;
    if(board[a] && board[a]===board[b] && board[a]===board[c]){
      gameOver=true;
      highlight(combo);
      end(board[a]+" thắng!");
      score[board[a]]++;
      updateScore();
      return true;
    }
  }

  if(!board.includes(null)){
    gameOver=true;
    end("Hòa!");
    score.draw++;
    updateScore();
    return true;
  }

  return false;
}

function highlight(c){
  c.forEach(i=>{
    document.querySelectorAll(".cell")[i].classList.add("highlight");
  });
}

function updateScore(){
  document.getElementById("xScore").textContent=score.X;
  document.getElementById("oScore").textContent=score.O;
  document.getElementById("drawScore").textContent=score.draw;
}

function end(msg){
  document.getElementById("status").textContent=msg;
  document.getElementById("winSound").play();
  confettiBoom();
}

function restart(){
  createBoard();
}

function back(){
  document.getElementById("game").style.display="none";
  document.getElementById("menu").style.display="block";
}

function playClick(){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play();
}

/* AI */
function aiMove(){
  let level=document.getElementById("level").value;

  if(level==="easy"){
    randomMove();
  }else if(level==="medium"){
    blockMove() || randomMove();
  }else{
    bestMove();
  }
}

function randomMove(){
  let empty=board.map((v,i)=>v?null:i).filter(v=>v!==null);
  moveAI(empty[Math.floor(Math.random()*empty.length)]);
}

function blockMove(){
  const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let c of wins){
    let [a,b,c2]=c;
    let arr=[board[a],board[b],board[c2]];
    if(arr.filter(v=>v==='X').length===2 && arr.includes(null)){
      moveAI([a,b,c2][arr.indexOf(null)]);
      return true;
    }
  }
  return false;
}

function bestMove(){
  let best=-Infinity, move;
  for(let i=0;i<9;i++){
    if(!board[i]){
      board[i]='O';
      let score=minimax(false);
      board[i]=null;
      if(score>best){best=score; move=i;}
    }
  }
  moveAI(move);
}

function minimax(isMax){
  let res=checkWinnerMini();
  if(res!==null) return res;

  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++){
      if(!board[i]){
        board[i]='O';
        best=Math.max(best,minimax(false));
        board[i]=null;
      }
    }
    return best;
  }else{
    let best=Infinity;
    for(let i=0;i<9;i++){
      if(!board[i]){
        board[i]='X';
        best=Math.min(best,minimax(true));
        board[i]=null;
      }
    }
    return best;
  }
}

function checkWinnerMini(){
  const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let c of wins){
    let [a,b,c2]=c;
    if(board[a] && board[a]===board[b] && board[a]===board[c2]){
      return board[a]==='O'?1:-1;
    }
  }
  if(!board.includes(null)) return 0;
  return null;
}

function moveAI(i){
  board[i]='O';
  render();
  playClick();
  if(checkWin()) return;
  current='X';
  document.getElementById("status").textContent="Lượt: X";
}

/* CONFETTI MẠNH */
function confettiBoom(){
  for(let i=0;i<350;i++){
    let d=document.createElement("div");
    d.className="confetti";
    d.style.left=Math.random()*100+"vw";
    d.style.background=`hsl(${Math.random()*360},100%,50%)`;
    d.style.animationDuration=(Math.random()*2+2)+"s";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),4000);
  }
}
</script>

</body>
</html>
