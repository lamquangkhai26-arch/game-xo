<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>XO Pro Mobile</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #4b6cb7, #182848);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.container {
    width: 330px;
    background: #1e2a47;
    padding: 20px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
    color: white;
}

/* TITLE */
h2 {
    margin-bottom: 5px;
}

/* TURN */
.turn {
    margin: 10px 0;
    font-size: 18px;
}

/* BOARD */
.board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    justify-content: center;
}

.cell {
    width: 90px;
    height: 90px;
    background: #0f1a30;
    border-radius: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    cursor: pointer;
    transition: 0.15s;
}

.cell:active {
    transform: scale(0.85);
}

/* COLORS */
.X { color: #4caf50; }
.O { color: #ff5252; }

.win {
    background: #4caf50 !important;
    color: white !important;
}

/* BUTTON */
button {
    margin-top: 12px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #4facfe, #00f2fe);
    color: white;
    font-size: 16px;
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: 0;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<!-- ÂM THANH -->
<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0cfa.mp3">
</audio>

<audio id="clickSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_270c4c1a3c.mp3">
</audio>

<div class="container">
    <h2>🎮 XO PRO</h2>
    <div class="turn" id="status">Lượt: X</div>

    <div class="board" id="board"></div>

    <button onclick="restart()">🔄 Reset Game</button>
</div>

<script>
let board = ["","","","","","","","",""];
let current = "X";
let gameOver = false;

const winCombo = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

document.body.addEventListener("click", () => {
    let music = document.getElementById("bgMusic");
    music.volume = 0.3;
    music.play();
}, {once:true});

function createBoard() {
    const b = document.getElementById("board");
    b.innerHTML = "";

    board.forEach((_,i)=>{
        let cell = document.createElement("div");
        cell.className = "cell";
        cell.onclick = ()=>move(i);
        b.appendChild(cell);
    });
}

function move(i){
    if(board[i] !== "" || gameOver) return;

    playClick();

    board[i] = current;
    render();

    if(checkWin()){
        endGame(current + " thắng!");
        return;
    }

    if(!board.includes("")){
        endGame("Hòa!");
        return;
    }

    current = "O";
    document.getElementById("status").textContent = "AI đang nghĩ...";

    setTimeout(aiMove, 300);
}

/* AI SIÊU KHÓ */
function aiMove(){
    let bestScore = -Infinity;
    let move;

    for(let i=0;i<9;i++){
        if(board[i]===""){
            board[i]="O";
            let score = minimax(false);
            board[i]="";
            if(score>bestScore){
                bestScore = score;
                move = i;
            }
        }
    }

    playClick();

    board[move] = "O";
    render();

    if(checkWin()){
        endGame("AI thắng!");
        return;
    }

    current = "X";
    document.getElementById("status").textContent = "Lượt: X";
}

function minimax(isMax){
    let res = checkWinnerMini();
    if(res!==null) return res;

    if(isMax){
        let best=-Infinity;
        for(let i=0;i<9;i++){
            if(board[i]===""){
                board[i]="O";
                best=Math.max(best,minimax(false));
                board[i]="";
            }
        }
        return best;
    } else {
        let best=Infinity;
        for(let i=0;i<9;i++){
            if(board[i]===""){
                board[i]="X";
                best=Math.min(best,minimax(true));
                board[i]="";
            }
        }
        return best;
    }
}

function checkWinnerMini(){
    for(let c of winCombo){
        let [a,b,d]=c;
        if(board[a] && board[a]==board[b] && board[a]==board[d]){
            return board[a]=="O"?1:-1;
        }
    }
    if(!board.includes("")) return 0;
    return null;
}

function render(){
    document.querySelectorAll(".cell").forEach((c,i)=>{
        c.textContent = board[i];
        c.classList.remove("X","O");
        if(board[i]) c.classList.add(board[i]);
    });
}

function checkWin(){
    return winCombo.some(c=>{
        if(c.every(i=>board[i]===current)){
            c.forEach(i=>{
                document.querySelectorAll(".cell")[i].classList.add("win");
            });
            return true;
        }
    });
}

function endGame(msg){
    document.getElementById("status").textContent = msg;
    gameOver = true;
    confetti();
}

function restart(){
    board=["","","","","","","","",""];
    current="X";
    gameOver=false;
    createBoard();
    render();
    document.getElementById("status").textContent="Lượt: X";
}

function playClick(){
    let s=document.getElementById("clickSound");
    s.currentTime=0;
    s.play();
}

function confetti(){
    for(let i=0;i<120;i++){
        let d=document.createElement("div");
        d.className="confetti";
        d.style.left=Math.random()*100+"vw";
        d.style.background=`hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),3000);
    }
}

createBoard();
</script>

</body>
</html>
