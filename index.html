<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Game XO</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #74ABE2, #5563DE);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }
    .card {
      background: #fff;
      color: #333;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      text-align: center;
      width: 300px;
      transition: transform 0.3s;
    }
    .card:hover { transform: scale(1.05); }
    button {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #5563DE;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background: #3740a3; }
    #game {
      display: none;
      flex-direction: column;
      align-items: center;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 10px;
      margin-top: 20px;
    }
    .cell {
      background: #fff;
      color: #333;
      font-size: 48px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .cell:active { transform: scale(0.9); }
    .highlight { background: #ffeb3b !important; }
    #status {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }
    #menuBtn {
      margin-top: 20px;
      background: #e74c3c;
    }
    canvas#confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="menu" class="card">
    <h2>Game XO</h2>
    <button onclick="startGame('ai')">Chơi với AI</button>
    <button onclick="startGame('2p')">Chơi 2 người</button>
  </div>

  <div id="game">
    <div class="board" id="board"></div>
    <div id="status"></div>
    <button onclick="restart()">Chơi lại</button>
    <button id="menuBtn" onclick="backToMenu()">Quay lại menu</button>
  </div>

  <canvas id="confetti"></canvas>

  <audio id="clickSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
  <audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
  <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<script>
let board = Array(9).fill(null);
let currentPlayer = 'X';
let mode = '2p';
let gameOver = false;

function startGame(selectedMode) {
  mode = selectedMode;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('board').innerHTML = '';
  board = Array(9).fill(null);
  currentPlayer = 'X';
  gameOver = false;
  document.getElementById('status').textContent = '';
  for (let i=0; i<9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;
    cell.addEventListener('click', handleClick);
    document.getElementById('board').appendChild(cell);
  }
  document.getElementById('bgMusic').play();
}

function handleClick(e) {
  const idx = e.target.dataset.index;
  if (board[idx] || gameOver) return;
  board[idx] = currentPlayer;
  e.target.textContent = currentPlayer;
  document.getElementById('clickSound').play();
  if (checkWin()) return;
  currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
  if (mode === 'ai' && currentPlayer === 'O') {
    aiMove();
  }
}

function checkWin() {
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  for (let combo of wins) {
    const [a,b,c] = combo;
    if (board[a] && board[a]===board[b] && board[a]===board[c]) {
      gameOver = true;
      document.getElementById('status').textContent = board[a] + ' thắng!';
      document.getElementById('winSound').play();
      highlight(combo);
      launchConfetti();
      return true;
    }
  }
  if (!board.includes(null)) {
    gameOver = true;
    document.getElementById('status').textContent = 'Hòa!';
    return true;
  }
  return false;
}

function highlight(combo) {
  combo.forEach(i=>{
    document.querySelector(`.cell[data-index='${i}']`).classList.add('highlight');
  });
}

function restart() {
  startGame(mode);
}

function backToMenu() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('menu').style.display = 'block';
  document.getElementById('bgMusic').pause();
  document.getElementById('bgMusic').currentTime = 0;
}

// AI với Minimax
function aiMove() {
  let bestScore = -Infinity;
  let move;
  for (let i=0; i<9; i++) {
    if (!board[i]) {
      board[i] = 'O';
      let score = minimax(board, 0, false);
      board[i] = null;
      if (score > bestScore) {
        bestScore = score;
        move = i;
      }
    }
  }
  board[move] = 'O';
  const cell = document.querySelector(`.cell[data-index='${move}']`);
  cell.textContent = 'O';
  document.getElementById('clickSound').play();
  if (checkWin()) return;
  currentPlayer = 'X';
}

function minimax(newBoard, depth, isMaximizing) {
  if (winner(newBoard)==='O') return 10 - depth;
  if (winner(newBoard)==='X') return depth - 10;
  if (!newBoard.includes(null)) return 0;

  if (isMaximizing) {
    let bestScore = -Infinity;
    for (let i=0; i<9; i++) {
      if (!newBoard[i]) {
        newBoard[i] = 'O';
        let score = minimax(newBoard, depth+1, false);
        newBoard[i] = null;
        bestScore = Math.max(score, bestScore);
      }
    }
    return bestScore;
  } else {
    let bestScore = Infinity;
    for (let i=0; i<9; i++) {
      if (!newBoard[i]) {
        newBoard[i] = 'X';
        let score = minimax(newBoard, depth+1, true);
        newBoard[i] = null;
        bestScore = Math.min(score, bestScore);
      }
    }
    return bestScore;
  }
}

function winner(b) {
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  for (let combo of wins) {
    const [a,b,c] = combo;
    if (b[a] && b[a]===b[b] && b[a]===b[c]) return b[a];
  }
