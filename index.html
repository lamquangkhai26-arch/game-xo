<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>XO Pro Game</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.container {
    width: 95vw;
    max-width: 420px;
    background: #0f1a30;
    padding: 20px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    text-align: center;
    color: white;
}

/* MENU */
.menu button {
    width: 100%;
    padding: 18px;
    margin: 10px 0;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
}

/* BOARD */
.board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin: 15px 0;
}

.cell {
    width: 110px;
    height: 110px;
    background: #16213e;
    border-radius: 15px;
    font-size: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.1s;
}

.cell:active {
    transform: scale(0.8);
}

/* COLORS */
.X { color: #4caf50; }
.O { color: #ff5252; }

.win {
    background: gold !important;
    color: black !important;
}

/* BUTTON */
button {
    padding: 12px;
    width: 100%;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff9800, #ff5722);
    color: white;
    font-size: 16px;
}

.hidden { display: none; }

/* CONFETTI */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: 0;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<!-- ÂM THANH -->
<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/27/audio_7c4c0c8c2f.mp3">
</audio>

<audio id="clickSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_8c983481b1.mp3">
</audio>

<audio id="winSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c4c5d9b59d.mp3">
</audio>

<div class="container">

<!-- MENU -->
<div id="menu">
    <h2>🎮 GAME XO</h2>
    <div class="menu">
        <button onclick="startGame('ai')">🤖 Chơi với AI</button>
        <button onclick="startGame('2p')">👥 2 Người</button>
    </div>
</div>

<!-- GAME -->
<div id="game" class="hidden">
    <h2 id="status">Lượt: X</h2>
    <div class="board" id="board"></div>
    <button onclick="backMenu()">🔄 Quay lại</button>
</div>

</div>

<script>
let board = ["","","","","","","","",""];
let current = "X";
let gameOver = false;
let mode = "ai";

const winCombo = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

/* bật nhạc khi click */
document.body.addEventListener("click", ()=>{
    let m=document.getElementById("bgMusic");
    m.volume=0.3;
    m.play().catch(()=>{});
},{once:true});

function startGame(m){
    mode = m;
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    createBoard();
}

function createBoard(){
    const b=document.getElementById("board");
    b.innerHTML="";
    board=["","","","","","","","",""];
    gameOver=false;
    current="X";

    board.forEach((_,i)=>{
        let cell=document.createElement("div");
        cell.className="cell";
        cell.onclick=()=>move(i);
        b.appendChild(cell);
    });

    updateStatus();
}

function move(i){
    if(board[i]!==""||gameOver) return;

    playClick();
    board[i]=current;
    render();

    if(checkWin()){
        endGame(current+" thắng!");
        return;
    }

    if(!board.includes("")){
        endGame("Hòa!");
        return;
    }

    current=current==="X"?"O":"X";
    updateStatus();

    if(mode==="ai" && current==="O"){
        setTimeout(aiMove,300);
    }
}

/* AI */
function aiMove(){
    let best=-Infinity,move;

    for(let i=0;i<9;i++){
        if(board[i]===""){
            board[i]="O";
            let score=minimax(false);
            board[i]="";
            if(score>best){
                best=score;
                move=i;
            }
        }
    }

    playClick();
    board[move]="O";
    render();

    if(checkWin()){
        endGame("AI thắng!");
        return;
    }

    current="X";
    updateStatus();
}

function minimax(isMax){
    let res=checkWinnerMini();
    if(res!==null) return res;

    if(isMax){
        let best=-Infinity;
        for(let i=0;i<9;i++){
            if(board[i]===""){
                board[i]="O";
                best=Math.max(best,minimax(false));
                board[i]="";
            }
        }
        return best;
    }else{
        let best=Infinity;
        for(let i=0;i<9;i++){
            if(board[i]===""){
                board[i]="X";
                best=Math.min(best,minimax(true));
                board[i]="";
            }
        }
        return best;
    }
}

function checkWinnerMini(){
    for(let c of winCombo){
        let[a,b,d]=c;
        if(board[a]&&board[a]==board[b]&&board[a]==board[d]){
            return board[a]=="O"?1:-1;
        }
    }
    if(!board.includes("")) return 0;
    return null;
}

function render(){
    document.querySelectorAll(".cell").forEach((c,i)=>{
        c.textContent=board[i];
        c.classList.remove("X","O");
        if(board[i]) c.classList.add(board[i]);
    });
}

function checkWin(){
    return winCombo.some(c=>{
        if(c.every(i=>board[i]===current)){
            c.forEach(i=>{
                document.querySelectorAll(".cell")[i].classList.add("win");
            });
            return true;
        }
    });
}

/* KẾT THÚC */
function endGame(msg){
    document.getElementById("status").textContent=msg;
    gameOver=true;

    document.getElementById("winSound").play();

    showVictoryText(msg);
    confettiBoom();
}

function updateStatus(){
    document.getElementById("status").textContent="Lượt: "+current;
}

function backMenu(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}

function playClick(){
    let s=document.getElementById("clickSound");
    s.currentTime=0;
    s.play();
}

/* CHỮ CHIẾN THẮNG */
function showVictoryText(text){
    let t=document.createElement("div");
    t.innerText=text;
    t.style.position="fixed";
    t.style.top="40%";
    t.style.width="100%";
    t.style.textAlign="center";
    t.style.fontSize="40px";
    t.style.color="yellow";
    t.style.fontWeight="bold";
    document.body.appendChild(t);

    setTimeout(()=>t.remove(),2000);
}

/* CONFETTI XỊN */
function confettiBoom(){
    for(let i=0;i<300;i++){
        let d=document.createElement("div");
        d.className="confetti";
        d.style.left=Math.random()*100+"vw";
        d.style.background=`hsl(${Math.random()*360},100%,50%)`;
        d.style.animationDuration=(Math.random()*2+2)+"s";
        document.body.appendChild(d);

        setTimeout(()=>d.remove(),4000);
    }
}
</script>

</body>
</html>
