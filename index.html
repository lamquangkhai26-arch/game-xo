<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game XO Pro Max++</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

/* MENU */
.menu {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.menu button {
    width: 85%;
    padding: 25px;
    margin: 15px;
    font-size: 22px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(0,198,255,0.6);
    transition: 0.3s;
}

.menu button:hover {
    transform: scale(1.05);
}

/* GAME */
#game {
    display: none;
    padding-top: 10px;
}

.board {
    width: 95vw;
    height: 70vh;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.cell {
    background: rgba(255,255,255,0.95);
    border-radius: 15px;
    font-size: 10vw;
    display: flex;
    justify-content: center;
    align-items: center;
    color: black;
    cursor: pointer;
    transition: 0.2s;
}

.cell:hover {
    transform: scale(1.05);
}

.cell:active {
    transform: scale(0.9);
}

.X { color: red; }
.O { color: blue; }

.win {
    background: #4caf50 !important;
    color: white !important;
}

/* STATUS */
#status {
    margin-top: 10px;
    font-size: 20px;
}

/* BUTTON */
#restart {
    margin-top: 10px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #ff9800;
    color: white;
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: 0;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<!-- ÂM THANH -->
<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0cfa.mp3">
</audio>

<audio id="clickSound">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_270c4c1a3c.mp3">
</audio>

<!-- MENU -->
<div class="menu" id="menu">
    <h1>🎮 GAME XO PRO MAX++</h1>
    <button onclick="startGame('ai')">🤖 Chơi với AI</button>
    <button onclick="startGame('2p')">👥 2 Người</button>
</div>

<!-- GAME -->
<div id="game">
    <div class="board" id="board"></div>
    <div id="status"></div>
    <button id="restart" onclick="restart()">🔄 Chơi lại</button>
</div>

<script>
let board = ["","","","","","","","",""];
let current = "X";
let mode = "";
let gameOver = false;

const winCombo = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

function startGame(m) {
    mode = m;
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";
    document.getElementById("bgMusic").play();
    createBoard();
}

function createBoard() {
    const boardDiv = document.getElementById("board");
    boardDiv.innerHTML = "";
    board = ["","","","","","","","",""];
    gameOver = false;
    current = "X";

    board.forEach((_, i) => {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.onclick = () => move(i);
        boardDiv.appendChild(cell);
    });

    updateStatus();
}

function move(i) {
    if (board[i] !== "" || gameOver) return;

    playClick();

    board[i] = current;
    render();

    if (checkWin()) {
        endGame(current + " thắng!");
        return;
    }

    if (!board.includes("")) {
        endGame("Hòa!");
        return;
    }

    current = current === "X" ? "O" : "X";
    updateStatus();

    if (mode === "ai" && current === "O") {
        setTimeout(aiMove, 300);
    }
}

/* ===== AI MINIMAX ===== */
function aiMove() {
    let bestScore = -Infinity;
    let move;

    for (let i = 0; i < 9; i++) {
        if (board[i] === "") {
            board[i] = "O";
            let score = minimax(board, 0, false);
            board[i] = "";

            if (score > bestScore) {
                bestScore = score;
                move = i;
            }
        }
    }

    playClick();

    board[move] = "O";
    render();

    if (checkWin()) {
        endGame("AI thắng!");
        return;
    }

    current = "X";
    updateStatus();
}

function minimax(board, depth, isMaximizing) {
    let result = checkWinnerMini();

    if (result !== null) return result;

    if (isMaximizing) {
        let bestScore = -Infinity;
        for (let i = 0; i < 9; i++) {
            if (board[i] === "") {
                board[i] = "O";
                let score = minimax(board, depth + 1, false);
                board[i] = "";
                bestScore = Math.max(score, bestScore);
            }
        }
        return bestScore;
    } else {
        let bestScore = Infinity;
        for (let i = 0; i < 9; i++) {
            if (board[i] === "") {
                board[i] = "X";
                let score = minimax(board, depth + 1, true);
                board[i] = "";
                bestScore = Math.min(score, bestScore);
            }
        }
        return bestScore;
    }
}

function checkWinnerMini() {
    for (let combo of winCombo) {
        let [a,b,c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            if (board[a] === "O") return 1;
            if (board[a] === "X") return -1;
        }
    }
    if (!board.includes("")) return 0;
    return null;
}
/* ===== END AI ===== */

function render() {
    document.querySelectorAll(".cell").forEach((cell,i)=>{
        cell.textContent = board[i];
        cell.classList.remove("X","O");
        if (board[i]) cell.classList.add(board[i]);
    });
}

function checkWin() {
    return winCombo.some(combo => {
        if (combo.every(i => board[i] === current)) {
            combo.forEach(i=>{
                document.querySelectorAll(".cell")[i].classList.add("win");
            });
            return true;
        }
    });
}

function endGame(msg) {
    document.getElementById("status").textContent = msg;
    gameOver = true;
    confetti();
}

function updateStatus() {
    document.getElementById("status").textContent = "Lượt: " + current;
}

function restart() {
    createBoard();
}

function playClick() {
    let sound = document.getElementById("clickSound");
    sound.currentTime = 0;
    sound.play();
}

function confetti() {
    for (let i=0;i<40;i++) {
        let div = document.createElement("div");
        div.className = "confetti";
        div.style.left = Math.random()*100 + "vw";
        div.style.background = `hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(div);

        setTimeout(()=>div.remove(),3000);
    }
}
</script>

</body>
</html>
