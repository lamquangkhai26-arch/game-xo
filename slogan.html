<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bảng LED Chuyên Nghiệp</title>
    <style>
        :root {
            --led-color: #ff0000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* Màn hình nhập liệu */
        #setup-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            gap: 20px;
        }

        input {
            padding: 15px;
            font-size: 1.2rem;
            width: 80%;
            max-width: 400px;
            border-radius: 10px;
            border: none;
        }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Màn hình hiển thị LED */
        #led-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* ÉP MÀN HÌNH NGANG KHI HIỂN THỊ */
        @media screen and (orientation: portrait) {
            #led-text {
                transform: rotate(90deg);
                width: 100vh; /* Chữ sẽ chạy theo chiều cao máy (lúc này là chiều ngang màn hình) */
            }
        }

        #led-text {
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            display: inline-block;
            transition: color 0.3s;
            /* Hiệu ứng LED */
            text-shadow: 0 0 20px var(--led-color), 0 0 40px var(--led-color), 0 0 80px var(--led-color);
            animation: blink 0.2s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2 style="color: var(--led-color)">NHẬP NỘI DUNG LED</h2>
        <input type="text" id="user-input" placeholder="Nhập câu bạn muốn hiển thị...">
        <button onclick="startLED()">BẮT ĐẦU</button>
    </div>

    <div id="led-screen" onclick="toggleMode()">
        <div id="led-text"></div>
    </div>

    <script>
        const setup = document.getElementById('setup-screen');
        const screen = document.getElementById('led-screen');
        const textDisplay = document.getElementById('led-text');
        const inputField = document.getElementById('user-input');

        let words = [];
        let currentMode = 1; 
        let intervalId = null;
        let colorIndex = 0;
        const colors = ['#FF0000', '#00FF00', '#FFFF00', '#00FFFF', '#FF00FF', '#FFFFFF'];

        function startLED() {
            const rawText = inputField.value.trim();
            if (!rawText) return alert("Vui lòng nhập nội dung!");

            // Tách câu thành mảng các từ (dựa trên khoảng trắng)
            words = rawText.split(/\s+/);
            
            setup.classList.add('hidden');
            screen.style.display = 'flex';

            // Yêu cầu toàn màn hình
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            updateView();
            startColorCycle();
        }

        function toggleMode() {
            currentMode = currentMode === 1 ? 2 : 1;
            updateView();
        }

        function updateView() {
            if (intervalId) clearInterval(intervalId);
            textDisplay.innerText = "";

            if (currentMode === 1) {
                // CHẾ ĐỘ 1: Hiện nguyên câu
                const fullText = words.join(" ");
                textDisplay.innerText = fullText;
                fitText(fullText.length);
            } else {
                // CHẾ ĐỘ 2: Hiện từng từ (0.5 giây)
                let i = 0;
                const showWord = () => {
                    const word = words[i];
                    textDisplay.innerText = word;
                    fitText(word.length);
                    i = (i + 1) % words.length;
                };
                showWord();
                intervalId = setInterval(showWord, 500);
            }
        }

        function fitText(len) {
            // Tự động tính cỡ chữ dựa trên số lượng ký tự để luôn chiếm full màn hình
            // 90vw là chiều ngang, chia cho số ký tự
            let fontSize = 95 / (len * 0.6); 
            if (fontSize > 85) fontSize = 85; // Không để to quá vượt chiều cao
            textDisplay.style.fontSize = fontSize + "vw";
        }

        function startColorCycle() {
            setInterval(() => {
                colorIndex = (colorIndex + 1) % colors.length;
                document.documentElement.style.setProperty('--led-color', colors[colorIndex]);
                textDisplay.style.color = colors[colorIndex];
            }, 2000);
        }

        // Thoát full màn hình thì quay lại menu
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                screen.style.display = 'none';
                setup.classList.remove('hidden');
                if (intervalId) clearInterval(intervalId);
            }
        });
    </script>
</body>
</html>
