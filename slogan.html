<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LED PRO</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    cursor: pointer;
}

/* chữ siêu to để nhìn xa */
#text {
    font-size: 12vw;
    font-weight: bold;
    text-align: center;
    letter-spacing: 1vw;
}

/* hiệu ứng LED */
.led {
    text-shadow:
        0 0 10px #0f0,
        0 0 20px #0f0,
        0 0 40px #0f0,
        0 0 80px #0f0;
    color: #0f0;
}

/* nhấp nháy */
.blink {
    animation: blink 0.5s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.2; }
    100% { opacity: 1; }
}
</style>
</head>

<body>

<div id="text" class="led"></div>

<script>
let slogan = "CHAO MUNG BAN DEN VOI WEBSITE!";
let text = document.getElementById("text");

/* tách từng chữ */
let chars = slogan.split("");

/* chế độ */
let mode = 1; // 1 = nhấp nháy toàn bộ, 2 = từng chữ
let index = 0;

/* MODE 1: hiển thị full + nhấp nháy */
function mode1() {
    text.innerHTML = slogan;
    text.classList.add("blink");
}

/* MODE 2: hiện từng chữ */
function mode2() {
    text.classList.remove("blink");

    setInterval(() => {
        text.innerHTML = chars[index];
        text.classList.add("blink");

        index++;
        if (index >= chars.length) index = 0;
    }, 300);
}

/* đổi chế độ khi bấm */
document.body.onclick = () => {
    mode++;

    if (mode > 2) mode = 1;

    location.reload(); // reset cho dễ
};

/* chạy */
if (mode === 1) {
    mode1();
} else {
    mode2();
}
</script>

</body>
</html>
