<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bảng LED Slogan Cực Lớn</title>
    <style>
        :root {
            --led-color: #ff0000; /* Màu mặc định: Đỏ */
            --bg-color: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Giao diện nhập liệu */
        #setup-screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        input[type="text"] {
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: white;
            width: 300px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        /* Màn hình LED */
        #led-screen {
            display: none; /* Ẩn lúc đầu */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        #led-text {
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
            /* Hiệu ứng LED phát sáng */
            text-shadow: 
                0 0 10px var(--led-color),
                0 0 20px var(--led-color),
                0 0 40px var(--led-color),
                0 0 80px var(--led-color);
            transition: color 0.5s ease;
        }

        /* Hiệu ứng chớp nháy (Blink) */
        .blink-animation {
            animation: blink 0.4s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.1; }
        }

        /* Ẩn các phần tử khi vào chế độ hiển thị */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #ff0000;">LED BOARD PRO</h1>
        <input type="text" id="slogan-input" placeholder="Nhập slogan của bạn..." maxlength="50">
        <button onclick="startLED()">BẮT ĐẦU</button>
        <p style="font-size: 0.8rem; color: #666;">Bấm vào màn hình sau khi chạy để đổi chế độ</p>
    </div>

    <div id="led-screen" class="hidden" onclick="toggleMode()">
        <div id="led-text" class="blink-animation">CHỮ LED</div>
    </div>

    <script>
        const setupScreen = document.getElementById('setup-screen');
        const ledScreen = document.getElementById('led-screen');
        const ledText = document.getElementById('led-text');
        const sloganInput = document.getElementById('slogan-input');

        let slogan = "";
        let currentMode = 1; // 1: Hiện cả câu, 2: Hiện từng chữ
        let flashInterval = null;
        let colorIndex = 0;
        const colors = ['#ff0000', '#00ff00', '#ffff00', '#00ffff', '#ff00ff', '#ffffff'];

        function startLED() {
            slogan = sloganInput.value.trim() || "HELLO";
            setupScreen.classList.add('hidden');
            ledScreen.classList.remove('hidden');
            
            // Yêu cầu Toàn màn hình
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            updateDisplay();
            startColorCycle();
        }

        function toggleMode() {
            currentMode = currentMode === 1 ? 2 : 1;
            updateDisplay();
        }

        function updateDisplay() {
            // Xóa bỏ interval cũ nếu có
            if (flashInterval) clearInterval(flashInterval);
            ledText.innerText = "";

            if (currentMode === 1) {
                // CHẾ ĐỘ 1: Hiện toàn bộ
                ledText.innerText = slogan;
                adjustFontSize(slogan.length);
            } else {
                // CHẾ ĐỘ 2: Hiện từng ký tự/chữ
                let words = slogan.split(""); // Chia theo ký tự để tối đa kích thước
                let i = 0;
                
                adjustFontSize(1); // Cỡ chữ cực đại cho 1 ký tự
                
                flashInterval = setInterval(() => {
                    ledText.innerText = words[i];
                    i = (i + 1) % words.length;
                }, 300); // 0.3 giây chuyển chữ
            }
        }

        function adjustFontSize(len) {
            // Tính toán responsive: Càng ít chữ càng to
            // 90vw chia cho số ký tự nhưng có giới hạn
            let size = Math.floor(95 / (len * 0.7)); 
            if (size > 80) size = 80; // Giới hạn tối đa 80vh
            ledText.style.fontSize = size + "vw";
        }

        // Tự động đổi màu LED cho sinh động
        function startColorCycle() {
            setInterval(() => {
                colorIndex = (colorIndex + 1) % colors.length;
                const newColor = colors[colorIndex];
                document.documentElement.style.setProperty('--led-color', newColor);
                ledText.style.color = newColor;
            }, 2000); // Đổi màu mỗi 2 giây
        }

        // Thoát full màn hình bằng phím Esc sẽ hiện lại menu (tùy trình duyệt)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                ledScreen.classList.add('hidden');
                setupScreen.classList.remove('hidden');
                if (flashInterval) clearInterval(flashInterval);
            }
        });
    </script>
</body>
</html>
